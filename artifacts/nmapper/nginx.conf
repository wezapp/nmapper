limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/m;
limit_req_status 429;

server {
    listen 8000;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    add_header X-Content-Type-Options  "nosniff"                                  always;
    add_header X-Frame-Options         "DENY"                                     always;
    add_header X-XSS-Protection        "1; mode=block"                            always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(svg|png|jpg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /nmap_results/ {
        autoindex on;
        autoindex_format html;
        limit_except GET { deny all; }
    }

    # Backend FastAPI Python — servi sous /scanner-api/
    location /scanner-api/ {
        limit_req zone=api_zone burst=10 nodelay;
        client_max_body_size 5m;

        limit_except GET POST DELETE PUT PATCH {
            deny all;
        }

        proxy_pass         http://nmapper-api:8001/scanner-api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout   5s;
        proxy_send_timeout     30s;
        proxy_read_timeout    300s;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
}
