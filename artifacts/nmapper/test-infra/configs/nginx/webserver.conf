server {
    listen 80;
    listen 443;
    server_name _;

    add_header Server "nginx/1.18.0 (Ubuntu)";
    add_header X-Powered-By "PHP/7.4.3";

    location / {
        return 200 '<!DOCTYPE html><html><head><title>Corporate Intranet</title></head><body><h1>Corp Intranet Portal</h1><p>Please login to access company resources.</p></body></html>';
        add_header Content-Type text/html;
    }

    location /api/ {
        return 200 '{"status":"ok","version":"1.2.0"}';
        add_header Content-Type application/json;
    }

    location /phpmyadmin/ {
        return 200 '<!DOCTYPE html><html><head><title>phpMyAdmin</title></head><body><h2>phpMyAdmin 4.9.5</h2></body></html>';
        add_header Content-Type text/html;
    }
}
