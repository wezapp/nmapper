server {
    listen 80;
    listen 443;
    listen 8080;
    listen 8443;
    server_name _;

    add_header Server "Apache/2.4.29 (Ubuntu)";

    location / {
        return 200 '<!DOCTYPE html><html><head><title>Company Portal</title></head><body><h1>Welcome</h1><p>Public portal — version 3.1</p></body></html>';
        add_header Content-Type text/html;
    }

    location /admin/ {
        return 200 '<!DOCTYPE html><html><body><h2>Admin Panel</h2><form><input type="text" placeholder="user"><input type="password" placeholder="pass"><button>Login</button></form></body></html>';
        add_header Content-Type text/html;
    }

    location /wp-admin/ {
        return 200 '<!DOCTYPE html><html><body><h2>WordPress Login</h2></body></html>';
        add_header Content-Type text/html;
        add_header X-Powered-By "WordPress 5.9.3";
    }
}
