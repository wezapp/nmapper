[global]
   workgroup = CORP
   server string = Windows Server
   netbios name = WIN-SRV
   security = user
   map to guest = Bad User
   dns proxy = no
   log level = 0

   # Simulate Windows-like behavior
   server min protocol = NT1
   ntlm auth = yes

[shared]
   path = /shared
   comment = Company Shared Drive
   browseable = yes
   read only = no
   guest ok = yes

[backup]
   path = /backup
   comment = Backup Storage
   browseable = yes
   read only = no
   guest ok = yes

[finance]
   path = /finance
   comment = Finance Department
   browseable = no
   read only = no
   guest ok = no
