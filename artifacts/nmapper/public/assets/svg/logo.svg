<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Fond du losange principal -->
    <path d="M60 10 L105 60 L60 110 L15 60 Z" 
          fill="none" 
          stroke="#3498db" 
          stroke-width="4"/>
    
    <!-- Losange intérieur (style Renault) -->
    <path d="M60 25 L85 60 L60 95 L35 60 Z" 
          fill="none" 
          stroke="#2196F3" 
          stroke-width="3"/>
    
    <!-- Points de connexion réseau aux angles -->
    <circle cx="60" cy="10" r="5" fill="#4CAF50"/>
    <circle cx="105" cy="60" r="5" fill="#FF5722"/>
    <circle cx="60" cy="110" r="5" fill="#4CAF50"/>
    <circle cx="15" cy="60" r="5" fill="#4CAF50"/>
    
    <!-- Lignes de connexion subtiles -->
    <line x1="60" y1="25" x2="60" y2="10" stroke="#3498db" stroke-width="2" opacity="0.6"/>
    <line x1="85" y1="60" x2="105" y2="60" stroke="#FF5722" stroke-width="2" opacity="0.6"/>
    <line x1="60" y1="95" x2="60" y2="110" stroke="#3498db" stroke-width="2" opacity="0.6"/>
    <line x1="35" y1="60" x2="15" y2="60" stroke="#3498db" stroke-width="2" opacity="0.6"/>
    
    <!-- Animation pulse subtile -->
    <path d="M60 10 L105 60 L60 110 L15 60 Z" 
          fill="none" 
          stroke="#3498db" 
          stroke-width="1" 
          opacity="0.3">
        <animate attributeName="stroke-width" 
                 values="1;3;1" 
                 dur="4s" 
                 repeatCount="indefinite"/>
        <animate attributeName="opacity" 
                 values="0.3;0.7;0.3" 
                 dur="4s" 
                 repeatCount="indefinite"/>
    </path>
</svg>